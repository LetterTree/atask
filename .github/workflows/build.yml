name: Build binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            use_docker: true
          - os: macos-latest
            platform: darwin
            use_docker: false
          - os: windows-latest
            platform: win32
            use_docker: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11 (non-Linux)
        if: matrix.use_docker == false
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (non-Linux)
        if: matrix.use_docker == false
        run: pip install pyinstaller --retries 5 --timeout 60

      - name: Disable Windows Defender real-time monitoring
        if: matrix.platform == 'win32'
        shell: powershell
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Build binary (non-Linux)
        if: matrix.use_docker == false
        shell: bash
        run: bash npm/scripts/build.sh --platform ${{ matrix.platform }}

      - name: Build binary (Linux via Docker)
        if: matrix.use_docker == true
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            python:3.11-slim-buster \
            bash -c "
              pip install pyinstaller &&
              pyinstaller npm/atask.spec \
                --distpath npm/packages/atask-linux-x64/bin \
                --workpath /tmp/atask-build \
                --noconfirm
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atask-${{ matrix.platform }}-x64
          path: npm/packages/atask-${{ matrix.platform }}-x64/bin/
          if-no-files-found: error
