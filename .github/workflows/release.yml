name: Release to npm

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            use_docker: true
          - os: macos-latest
            platform: darwin
            use_docker: false
          - os: windows-latest
            platform: win32
            use_docker: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11 (non-Linux)
        if: matrix.use_docker == false
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (non-Linux)
        if: matrix.use_docker == false
        run: pip install pyinstaller --retries 5 --timeout 60

      - name: Build binary (non-Linux)
        if: matrix.use_docker == false
        shell: bash
        run: bash npm/scripts/build.sh --platform ${{ matrix.platform }}

      - name: Build binary (Linux via manylinux Docker)
        if: matrix.use_docker == true
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -c "
              /opt/python/cp311-cp311/bin/pip install pyinstaller &&
              /opt/python/cp311-cp311/bin/pyinstaller npm/atask.spec \
                --distpath npm/packages/atask-linux-x64/bin \
                --workpath /tmp/atask-build \
                --noconfirm
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atask-${{ matrix.platform }}-x64
          path: npm/packages/atask-${{ matrix.platform }}-x64/bin/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: atask-linux-x64
          path: npm/packages/atask-linux-x64/bin/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: atask-darwin-x64
          path: npm/packages/atask-darwin-x64/bin/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: atask-win32-x64
          path: npm/packages/atask-win32-x64/bin/

      - name: Make Unix binaries executable
        run: |
          chmod +x npm/packages/atask-linux-x64/bin/atask || true
          chmod +x npm/packages/atask-darwin-x64/bin/atask || true

      - name: Publish platform packages
        run: |
          (cd npm/packages/atask-linux-x64 && npm publish --access public)
          (cd npm/packages/atask-darwin-x64 && npm publish --access public)
          (cd npm/packages/atask-win32-x64 && npm publish --access public)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
