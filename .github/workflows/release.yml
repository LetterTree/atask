name: Release to npm

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: win32

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build binary
        shell: bash
        run: bash npm/scripts/build.sh --platform ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atask-${{ matrix.platform }}-x64
          path: npm/packages/atask-${{ matrix.platform }}-x64/bin/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: atask-linux-x64
          path: npm/packages/atask-linux-x64/bin/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: atask-darwin-x64
          path: npm/packages/atask-darwin-x64/bin/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: atask-win32-x64
          path: npm/packages/atask-win32-x64/bin/

      - name: Make Unix binaries executable
        run: |
          chmod +x npm/packages/atask-linux-x64/bin/atask || true
          chmod +x npm/packages/atask-darwin-x64/bin/atask || true

      - name: Publish platform packages
        run: |
          (cd npm/packages/atask-linux-x64 && npm publish --access public)
          (cd npm/packages/atask-darwin-x64 && npm publish --access public)
          (cd npm/packages/atask-win32-x64 && npm publish --access public)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
